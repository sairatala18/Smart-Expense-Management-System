<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Login - ExpenseApp</title>
    <style>
        :root { --emerald: #10b981; --charcoal: #111827; }
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at center, #1f2937 0%, #111827 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 24px;
            width: 350px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; color: white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { color: var(--emerald); margin-bottom: 30px; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; }
        input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: white; box-sizing: border-box; transition: 0.3s;
        }
        input:focus { border-color: var(--emerald); outline: none; background: rgba(16, 185, 129, 0.05); }
        .btn-login {
            width: 100%; padding: 14px; background: var(--emerald);
            border: none; border-radius: 10px; color: #064e3b;
            font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s;
        }
        .btn-login:hover { background: #34d399; transform: translateY(-2px); }
        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: var(--emerald); text-decoration: none; margin: 0 10px; }
        .error { color: #f87171; font-size: 13px; margin-top: 15px; background: rgba(248, 113, 113, 0.1); padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Employee Portal</h2>
        <form method="POST">
            <div class="input-group">
                <label>Username or Email</label>
                <input type="text" name="name" required placeholder="Enter credentials">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">SIGN IN</button>
        </form>
        {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
        <div class="links">
            <a href="/forgot_password">Forgot Password?</a>
            <span style="color: #4b5563;">|</span>
            <a href="/employee_register">Register</a>
        </div>
    </div>
</body>
</html>
