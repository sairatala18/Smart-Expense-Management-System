<!DOCTYPE html>
<html>
<head>
    <title>Verify Identity - ExpenseApp</title>
    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: white; padding: 40px; border-radius: 20px;
            width: 100%; max-width: 360px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { color: #2d3748; margin-bottom: 8px; }
        .info { color: #718096; font-size: 14px; margin-bottom: 25px; }

        input {
            width: 100%; padding: 15px; font-size: 24px;
            text-align: center; letter-spacing: 8px;
            border: 2px solid #e2e8f0; border-radius: 12px;
            margin-bottom: 20px; font-weight: bold; color: #27ae60;
        }

        button {
            width: 100%; padding: 15px; background: #27ae60;
            color: white; border: none; border-radius: 12px;
            cursor: pointer; font-weight: bold; font-size: 16px;
        }

        .error { color: #e53e3e; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Verify OTP</h2>
        <p class="info">Enter the 6-digit code sent to<br><b>{{ session['reset_email'] }}</b></p>
        <form method="POST" action="/verify_otp">
            <input type="text" name="otp" placeholder="000000" required maxlength="6" pattern="\d{6}">
            <button type="submit">Verify & Continue</button>
        </form>
        {% if error %}<div class="error">❌ {{ error }}</div>{% endif %}
    </div>
</body>
</html>
