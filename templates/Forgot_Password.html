<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - ExpenseApp</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-color: #3182ce;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px; border-radius: 20px;
            width: 100%; max-width: 380px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h2 { color: #2d3748; margin-bottom: 10px; font-size: 26px; }
        p { color: #718096; margin-bottom: 25px; font-size: 14px; line-height: 1.5; }

        input {
            width: 100%; padding: 14px; margin-bottom: 15px;
            border: 2px solid #e2e8f0; border-radius: 12px;
            box-sizing: border-box; transition: 0.3s;
        }

        input:focus { border-color: var(--primary-color); outline: none; box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.1); }

        button {
            width: 100%; padding: 14px; background: var(--primary-color);
            color: white; border: none; border-radius: 12px;
            cursor: pointer; font-weight: 700; font-size: 16px; transition: 0.2s;
        }

        button:hover { background: #2b6cb0; transform: translateY(-1px); }
        
        .error { color: #c53030; background: #fff5f5; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 13px; border: 1px solid #feb2b2; }
        .back-link { display: block; margin-top: 20px; color: #718096; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Reset Password</h2>
    <p>Enter your registered email address and we'll send you a 6-digit OTP code.</p>
    <form method="POST" onsubmit="this.querySelector('button').innerText='Sending...'">
        <input type="email" name="email" placeholder="email@company.com" required>
        <button type="submit">Send OTP</button>
    </form>
    {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    <a href="/employee_login" class="back-link">← Back to Login</a>
</div>
</body>
</html>
