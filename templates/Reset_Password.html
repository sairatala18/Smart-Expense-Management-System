<!DOCTYPE html>
<html>
<head>
    <title>New Password - ExpenseApp</title>
    <style>
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }

        .card {
            background: white; padding: 40px; border-radius: 20px;
            width: 380px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 { color: #2d3748; margin-bottom: 20px; }

        .input-box { text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #4a5568; margin-bottom: 5px; }

        input {
            width: 100%; padding: 12px; border: 2px solid #e2e8f0;
            border-radius: 10px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 15px; background: #3182ce;
            color: white; border: none; border-radius: 10px;
            cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px;
        }

        .error { color: #c53030; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Set New Password</h2>
        <form method="POST" action="/reset_password">
            <div class="input-box">
                <label>New Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
        {% if error %}<div class="error">⚠️ {{ error }}</div>{% endif %}
    </div>
</body>
</html>
